name: Build and Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "vite.config.ts"
      - "postcss.config.cjs"
      - "src/**"
      - "public/**"
  workflow_dispatch:

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: kostecki/are-they-alive

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
          build-args: |
            VITE_UMAMI_SRC_URL=${{ vars.VITE_UMAMI_SRC_URL }}
            VITE_UMAMI_WEBSITE_ID=${{ vars.VITE_UMAMI_WEBSITE_ID }}

  deploy:
    needs: build-and-push-image
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - name: Deploy via Komodo
        uses: Kostecki/shared-actions/.github/actions/deploy-komodo@main
        with:
          ts-oauth-client-id: ${{ vars.TS_OAUTH_CLIENT_ID }}
          ts-host: ${{ vars.TS_HOST }}
          komodo-port: ${{ vars.KOMODO_PORT }}
          komodo-api-key: ${{ secrets.KOMODO_API_KEY }}
          komodo-api-secret: ${{ secrets.KOMODO_API_SECRET }}
          komodo-stack-id: ${{ vars.KOMODO_STACK_ID }}
