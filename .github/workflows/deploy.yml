name: Build and Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: kostecki/are-they-alive

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
          build-args: |
            VITE_UMAMI_SRC_URL=${{ vars.VITE_UMAMI_SRC_URL }}
            VITE_UMAMI_WEBSITE_ID=${{ vars.VITE_UMAMI_WEBSITE_ID }}

      - name: Bypass Cloudflare for GitHub Action
        uses: xiaotianxt/bypass-cloudflare-for-github-action@v2.1.0
        with:
          cf_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          cf_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          cf_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          disable_bot_fight_mode: "true"
          bfm_propagation_delay: "30"

      - name: Trigger Komodo stack update
        id: trigger-komodo-update
        run: |
          curl -X POST "${{ vars.KOMODO_API_URL }}/write/CheckStackForUpdate" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.KOMODO_API_KEY }}" \
            -H "X-API-Secret: ${{ secrets.KOMODO_API_SECRET }}" \
            -d '{"stack": "${{ vars.KOMODO_STACK_ID }}"}'
      - name: Show Response
        run: |
          echo "Status: ${{ steps.trigger-komodo-update.outputs.status }}"
          echo "Response: ${{ steps.trigger-komodo-update.outputs.response }}"
          echo "Headers: ${{ steps.trigger-komodo-update.outputs.headers }}"
